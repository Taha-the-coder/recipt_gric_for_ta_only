<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tech Autocrats | Under Construction</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --orange: #ff7438;
      --black: #050505;
      --dark: #0b0b0b;
      --grey: #9b9b9b;
      --light: #f5f5f5;
    }

    body {
      min-height: 100vh;
      background: var(--black);
      color: var(--light);
      font-family: Inter, Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      overflow: hidden;
    }

    .lines {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 116, 56, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 116, 56, 0.04) 1px, transparent 1px);
      background-size: 70px 70px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
      z-index: 0;
    }

    .page {
      width: 100%;
      max-width: 1050px;
      position: relative;
      z-index: 2;
    }

    .logo {
      width: 250px;
      margin-bottom: 70px;
    }

    .logo img {
      width: 100%;
      display: block;
    }

    .tag {
      color: var(--orange);
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 22px;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(3.5rem, 10vw, 9rem);
      line-height: 0.92;
      letter-spacing: -6px;
      max-width: 980px;
      margin-bottom: 34px;
    }

    h1 span {
      color: var(--orange);
    }

    .text {
      max-width: 640px;
      color: var(--grey);
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 42px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 13px 18px;
      border: 1px solid rgba(255, 116, 56, 0.25);
      border-radius: 999px;
      color: #d9d9d9;
      font-size: 14px;
      background: rgba(255, 116, 56, 0.04);
    }

    .loading-dot {
      width: 9px;
      height: 9px;
      background: var(--orange);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--orange);
      animation: pulse 1.6s infinite;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .socials a {
      color: var(--light);
      text-decoration: none;
      font-size: 14px;
      border: 1px solid rgba(255, 116, 56, 0.25);
      padding: 11px 17px;
      border-radius: 999px;
      background: rgba(255, 116, 56, 0.03);
      transition: 0.25s ease;
    }

    .socials a:hover {
      color: var(--black);
      background: var(--orange);
      border-color: var(--orange);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 85px;
      padding-top: 24px;
      border-top: 1px solid #151515;
      display: flex;
      justify-content: space-between;
      color: #555;
      font-size: 13px;
    }

    .gears {
      position: absolute;
      right: -60px;
      bottom: -40px;
      width: 360px;
      height: 360px;
      opacity: 0.18;
      z-index: 1;
    }

    .gear {
      position: absolute;
      border: 12px solid var(--orange);
      border-radius: 50%;
      animation: spin 10s linear infinite;
    }

    .gear::before {
      content: "";
      position: absolute;
      inset: 32%;
      border: 10px solid var(--orange);
      border-radius: 50%;
    }

    .gear::after {
      content: "";
      position: absolute;
      inset: -28px;
      background:
        linear-gradient(0deg, transparent 42%, var(--orange) 42%, var(--orange) 58%, transparent 58%),
        linear-gradient(45deg, transparent 43%, var(--orange) 43%, var(--orange) 57%, transparent 57%),
        linear-gradient(90deg, transparent 42%, var(--orange) 42%, var(--orange) 58%, transparent 58%),
        linear-gradient(135deg, transparent 43%, var(--orange) 43%, var(--orange) 57%, transparent 57%);
      border-radius: 50%;
      z-index: -1;
    }

    .gear.large {
      width: 190px;
      height: 190px;
      right: 40px;
      bottom: 70px;
    }

    .gear.small {
      width: 125px;
      height: 125px;
      right: 210px;
      bottom: 15px;
      animation-direction: reverse;
      animation-duration: 7s;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.35;
        transform: scale(0.7);
      }
    }

    @media (max-width: 700px) {
      body {
        overflow-y: auto;
      }

      .logo {
        width: 190px;
        margin-bottom: 55px;
      }

      h1 {
        letter-spacing: -3px;
      }

      .text {
        font-size: 16px;
      }

      .status {
        font-size: 13px;
      }

      .gears {
        width: 250px;
        height: 250px;
        right: -110px;
        bottom: -90px;
      }

      .footer {
        flex-direction: column;
        gap: 12px;
        margin-top: 70px;
      }
    }
  </style>
</head>

<body>
  <div class="lines"></div>

  <main class="page">
    <div class="logo">
      <img src="TA_LOGO.png" alt="Tech Autocrats Logo">
    </div>


    <h1>
      Website is<br>
      <span>processing.</span>
    </h1>

    <p class="text">
      We are currently building the site, debugging reality, and convincing the machines
      to cooperate. Something smarter is coming soon.
    </p>

    <div class="status">
      <span class="loading-dot"></span>
      <span>System status: robots working, humans pretending to supervise</span>
    </div>

    <div class="socials">
      <a href="https://www.facebook.com/TechAutocratsOfficial" target="_blank">Facebook</a>
      <a href="https://www.instagram.com/techautocrats_ta/" target="_blank">Instagram</a>
      <a href="https://www.linkedin.com/company/tech-autocrats/" target="_blank">LinkedIn</a>
      <a href="https://wa.me/8801886892326" target="_blank">WhatsApp</a>
    </div>

    <div class="footer">
      <span>Tech Autocrats</span>
      <span>Coming Soon</span>
    </div>
  </main>

  <div class="gears">
    <div class="gear large"></div>
    <div class="gear small"></div>
  </div>
</body>
</html>
